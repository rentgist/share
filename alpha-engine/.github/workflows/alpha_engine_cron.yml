name: Quant Alpha Engine Automator

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간 정각에 실행 (UTC 기준)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  run-alpha-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_pipeline.py

      - name: Run Smart Money Engine
        run: python smart_money_engine.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "auto: update Alpha Engine data [skip ci]" || echo "No changes to commit"
          git push
